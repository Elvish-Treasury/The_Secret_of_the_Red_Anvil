#textdomain wesnoth-tsotra
[scenario]
    id=dwarves_ep
    next_scenario=null
    name= _ "Epilogue"
    {NO_MAP_DATA}
    turns=-1
    
    {INTRO_AND_SCENARIO_MUSIC journeys_end.ogg silence.ogg}

    [story]
        [part]
            [background_layer]
                image=story/landscape-hills-01.webp
                scale_vertically=no
            [/background_layer]
            story= _ "The elves helped the dwarves clear the caves of the remaining trolls. Some time later, they delivered the promised gold, and a fragile peace once again reigned between the two peoples."
        [/part]
        [part]
            [background_layer]
                image=story/landscape-hills-01.webp
                scale_vertically=no
            [/background_layer]
            story= _ "Farim and Brim worked tirelessly to rebuild what had been destroyed. The old master drove them to exhaustion, but Farin accepted it as just punishment for his long tongue, and Brim for failing to stop him in time."
        [/part]
        [part]
            [background_layer]
                image=story/landscape-hills-01.webp
                scale_vertically=no
            [/background_layer]
            story= _ "When the order was finally completed and delivered to the elves, Arbald at last looked at his two apprentices without his usual irritation and declared that he would name Brim his successor."
        [/part]
        [part]
            background=portraits/dwarves/runemaster.webp
            scale_background=no
            story= _ "<i>You have both learned how costly loose talk can be, and how important it is to guard the secrets of our craft,</i> he said. <i>But Brim knows better how to keep his tongue in check. With him, I will have peace of mind. He will be my apprentice — and the future master of our forge.</i>"
        [/part]
        [part]
            background=portraits/dwarves/fighter.webp
            scale_background=no
            story= _ "Farin opened his mouth to protest, but then thought better of it."
        [/part]
        [part]
            background=portraits/dwarves/runemaster.webp
            scale_background=no
            story= _ "<i>As for you, Farin,</i> Arbald continued, <i>you will lead the clan’s guard. Your fierce temper and sharp tongue will serve you far better there than at the anvil.</i>"
        [/part]
        [part]
            [background_layer]
                image=story/landscape-hills-01.webp
                scale_vertically=no
            [/background_layer]
            story= _ "Farin only smirked and nodded. Brim bowed silently to the master."
        [/part]
        [part]
            [background_layer]
                image=story/landscape-hills-01.webp
                scale_vertically=no
            [/background_layer]
            story= _ "Each of them understood that they had received the fate they had earned."
        [/part]
    [/story]

    [side]
        side=1
        {SIDE_1_ESSENTIALS}
        {SIDE_1_GOLD_FIXED 150 75}
        {FARIN}
        fog=no
        shroud=yes
    [/side]

    [side]
        side=2
        {SIDE_2_ESSENTIALS}
        {BRIM}
        gold=75
        fog=no
        shroud=yes
    [/side]

    [event]
    name=prestart 

        [endlevel]
            carryover_report=no
            replay_save=no
            linger_mode=no
        [/endlevel]
    [/event]
    {HERODEATHS}
[/scenario]
