#textdomain wesnoth-tsotra
[scenario]
    id=dwarves_03
    next_scenario=dwarves_04
    name= _ "Rescuing Arbald"
    map_data="{~add-ons/The_Secret_of_the_Red_Anvil/maps/03.map}"
    victory_when_enemies_defeated=no
    carryover_percentage=40
    carryover_add=yes
    {DEFAULT_SCHEDULE}
    {TURNS 40 37 34}

    {INTRO_AND_SCENARIO_MUSIC revelation.ogg breaking_the_chains.ogg}
    {EXTRA_SCENARIO_MUSIC vengeful.ogg}
    {EXTRA_SCENARIO_MUSIC battle.ogg}
    {EXTRA_SCENARIO_MUSIC casualties_of_war.ogg}

    [story]
        [part]
            [background_layer]
                image=story/landscape-hills-01.webp
                scale_vertically=no
            [/background_layer]
            story= _ "The Dwarves drew ever closer to the elvish city. Each of them feared they were about to be riddled with elvish arrows like a hedgehog, but that didn’t happen. To everyone’s surprise, Farin’s party reached the elvishj gates..."
        [/part]
    [/story]

    [side]
        side=1
        {SIDE_1_ESSENTIALS}
        {SIDE_1_GOLD_FIXED 150 100}
        {FARIN}
        fog=no
        shroud=no
#ifndef MULTIPLAYER
        [unit]
            {BRIM}
            location_id=2
        [/unit]
#endif
    [/side]

    [side]
        side=2
        {SIDE_2_ESSENTIALS}
        {BRIM}
        gold=100
        fog=no
        shroud=no
    [/side]

    [side]
        side=3
        {UNPLAYABLE_SIDE}
        team_name=elves
        user_team_name= _ "Elves"
        {FLAG_VARIANT wood-elvish}
        hidden=no 
        type=Elvish Lord
        id=Nythalos
        name=_ "Lord Nythalos"
        {GOLD 230 270 340}
        {INCOME 3 5 10}
        recruit=Elvish Fighter, Elvish Archer, Elvish Shaman, Elvish Captain, Elvish Hero, Elvish Druid, Elvish Sorceress, Elvish Marksman, Elvish Ranger 
        [ai]
            passive_leader=yes 
        [/ai]
    [/side]

    [side]
        side=4
        {UNPLAYABLE_SIDE}
        team_name=elves
        user_team_name= _ "Elves"
        {FLAG_VARIANT wood-elvish}
        hidden=yes
        recruit=Elvish Fighter, Elvish Archer, Elvish Shaman, Elvish Scout
        [ai]
            passive_leader=yes 
        [/ai]
    [/side]

    [side]
        side=5
        {UNPLAYABLE_SIDE}
        team_name=elves
        user_team_name= _ "Elves"
        {FLAG_VARIANT wood-elvish}
        hidden=yes
        recruit=Elvish Fighter, Elvish Archer, Elvish Shaman, Elvish Scout
        [ai]
            passive_leader=yes 
        [/ai]
    [/side]

    {STARTING_VILLAGES_ALL 3}

    [event]
    name=prestart 

        [recall]
            id=Rashakan 
            placement=leader 
        [/recall]
    [/event]

    [event]
    name=start 

        [message]
            speaker=Farin 
            message= _ "Ho there, elves! We know Arbald is in your hands! Release him, and we will return to our halls in peace."
        [/message]
        [message]
            speaker=Nythalos
            message= _ "What are you doing here? The wild beasts should have torn you to pieces."
        [/message]
        [message]
            speaker=Farin 
            message= _ "Our hammers had other plans. Release Arbald, or you'll share their fate."
        [/message]
        [message]
            speaker=Nythalos
            message= _ "Spare me your empty threats, dwarf. You have no chance against the elves in these woods, and you know it — your voice betrays you. I fear you will return to your caves empty-handed. Arbald will remain with us until he teaches us how to forge steel armor fit for elven warriors."
        [/message]
        [message]
            speaker=Brim
            message= _ "So... that argument really did have consequences."
        [/message]
        [message]
            speaker=Farin
            message= _ "Nonsense! Old Arbald would never reveal his secrets to elves!"
        [/message]
        [message]
            speaker=Nythalos
            message= _ "Perhaps not at once. But dwarves are devoted to their craft above all else. When Arbald feels death drawing near, do you truly believe he will let his life's work perish with him? I think not. And I have all the time I need."
        [/message]
        [message]
            speaker=Farin
            message= _ "And why should his craft die with him?"
        [/message]
        [message]
            speaker=Nythalos
            message= _ "Is it not obvious. Arbald has yet to pass it on to any of you. Otherwise, you would not have come so desperately to rescue him."
        [/message]
        [message]
            speaker=Brim
            message= _ "If you desire such armor so badly, why not simply commission it from us? Why start a war?"
        [/message]
        [message]
            speaker=Nythalos
            message= _ "The orcs grow stronger with every passing year. I cannot allow the survival of my people to depend upon the shifting interests of underground merchants. And how could I trust that the orcs will not overrun you? You can barely keep the trolls from your borders."
        [/message]
        [message]
            speaker=Farin
            message= _ "Lying coward! You took advantage of the troll attack like a scavenger!"
        [/message]
        [message]
            speaker=Nythalos
            message= _ "I have said all that needs saying. Leave now, or die beneath our arrows."
        [/message]
        [message]
            speaker=Farin
            message= _ "I'm not leaving without Arbald! Come on, lads — let our steel answer their arrogance!"
        [/message]

        {HIGHLIGHT_IMAGE 18 15 "units/dwarves/arcanister.png~RC(magenta>red)~BLIT(items/cage.png)" ()}

        [objectives]
            side=1,2
            [objective]
                [show_if]
                    [not]
                        [have_unit]
                            id=Arbald 
                        [/have_unit]
                    [/not]
                [/show_if]
                description=_ "Move Farin or Brim to the elvish prison"
                condition=win 
            [/objective]
            [objective]
                [show_if]
                    [have_unit]
                        id=Arbald 
                    [/have_unit]
                [/show_if]
                description=_ "Move Farin or Brim to the dwarvish village in north-east mountains"
                condition=win 
            [/objective]
            [objective]
                description=_ "Death of Farin"
                condition=lose
            [/objective]
            [objective]
                description=_ "Death of Brim"
                condition=lose
            [/objective]
            [objective]
                [show_if]
                    [have_unit]
                        id=Arbald 
                    [/have_unit]
                [/show_if]
                description=_ "Death of Arbald the Iron"
                condition=lose
            [/objective]
            {TURNS_RUN_OUT}
            [gold_carryover]
                carryover_percentage=40
                bonus=yes
            [/gold_carryover]
        [/objectives]
    [/event]

    {TSOTRA_RUNIC_CHEST_FORCE 9 28}
    {TSOTRA_RUNIC_CHEST_SWIFTNESS 11 29}

    [event]
    name=moveto 

        [filter]
            race=dwarf 
            canrecruit=yes 
            x=18
            y=15
        [/filter]

        {REMOVE_IMAGE 18 15}
        [unit]
            type=Dwarvish Arcanister 
            id=Arbald
            name=_ "Arbald the Iron"
            {IS_HERO}
            unrenamable=yes 
            [modifications]
                {TRAIT_AGED}
                {TRAIT_QUICK}
            [/modifications]
            side=$unit.side 
            animate=yes 
            x,y=18,15
        [/unit]

        [message]
            speaker=Arbald 
            message= _ "Which one of you fools told the elves I could forge such armor for them?!"
        [/message]
        [message]
            speaker=Farin
            message= _ "I did, master. But... isn't it true?"
        [/message]
        [message]
            speaker=Arbald
            message= _ "Farin, you dolt! I ought to brand that loose tongue of yours with a pair of smith's tongs! Even if it were possible, why in the depths would the elves need to know about it?!"
        [/message]
        [message]
            [show_if]
                [have_unit]
                    id=Rashakan 
                [/have_unit]
            [/show_if]
            speaker=Arbald
            message= _ "And what in the blazes is this dragon doing with you, damn you?!"
        [/message]
        [message]
            speaker=Brim
            message= _ "We can settle all of that when we get home, master. Right now, we need to leave."
        [/message]
        [message]
            speaker=Arbald
            message= _ "Brim! At least one dwarf here has a working head! But how, in the Ancestors' name, are we supposed to outrun elves in their own forest?"
        [/message]
        [message]
            speaker=Farin
            message= _ "There are hills to the northeast. If we can reach them, we may be able to lose our pursuers."
        [/message]
        [message]
            speaker=Arbald
            message= _ "Silence, Farin!... Though... that's not a bad idea. What are you standing around for? Move!"
        [/message]

        {HIGHLIGHT_IMAGE 31 1 items/gohere.png ()}
        [show_objectives][/show_objectives]
    [/event]

    [event]
    name=moveto 

        [filter]
            race=dwarf 
            canrecruit=yes 
            x=31
            y=1
        [/filter]

        [filter_condition] 
            [have_unit]
                id=Arbald 
            [/have_unit]
        [/filter_condition]

        [message]
            speaker=unit
            message= _ "We're almost clear!"
        [/message]

        [message]
            speaker=Arbald
            message= _ "Just wait until we get home — I'll tan the hides off both of you!"
        [/message]

        [endlevel]
            result=victory 
        [/endlevel]
    [/event]

    [event]
    name=turn 7 

        [unit]
            side=4
            type=Elvish Hero 
            generate_name=yes 
            canrecruit=yes 
            x,y=27,31 
        [/unit]

        {MOVE_UNIT side=4 27 30}

        [terrain]
            x,y=27,30
            terrain=Ke 
        [/terrain]
        [terrain]
            x=26,27,28 
            y=29,29,29
            terrain=Ce 
        [/terrain]
        [redraw][/redraw]
        [modify_side]
            side=4
            {GOLD 100 130 150}
            {INCOME 5 10 15}
            hidden=no
            [ai]
                passive_leader=yes
                [goal]
                    name=target_unit 
                    [criteria]
                        race=dwarf 
                        canrecruit=yes 
                    [/criteria]
                    value=5 
                [/goal]
            [/ai]
        [/modify_side]

        [unit]
            side=5
            type=Elvish Marksman
            generate_name=yes 
            gender=female
            canrecruit=yes 
            x,y=16,1
        [/unit]

        {MOVE_UNIT side=5 16 2}

        [terrain]
            x,y=16,2
            terrain=Ke 
        [/terrain]
        [terrain]
            x=15,16,17
            y=3,3,3
            terrain=Ce 
        [/terrain]
        [redraw][/redraw]
        [modify_side]
            side=5
            {GOLD 100 130 150}
            {INCOME 5 10 15}
            hidden=no
            [ai]
                passive_leader=yes
                [goal]
                    name=target_unit 
                    [criteria]
                        race=dwarf 
                        canrecruit=yes 
                    [/criteria]
                    value=5 
                [/goal]
            [/ai]
        [/modify_side]

        [message]
            side=4 
            canrecruit=yes
            message= _ "We have answered your summons, my lord!"
        [/message]

        [message]
            speaker=Nythalos
            message= _ "Seize the intruders and throw them into the dungeons!"
        [/message]

        [message]
            speaker=Brim
            message= _ "Uh-oh... The elves are surrounding us."
        [/message]

        [message]
            speaker=Farin
            message= _ "*gulp*"
        [/message]
    [/event]
    [event]
    name=last breath 

        [filter]
            id=Nythalos 
        [/filter]

        [message]
            speaker=unit 
            message= _ "I will not fall by a dwarf’s hand!"
        [/message]

        {FLASH_GREEN (
            [sound]
                name=magic-faeriefire.ogg 
            [/sound]
            [kill]
                id=Nythalos 
                animate=no 
            [/kill]
        )}

        [message]
            speaker=Farin
            message= _ "Their leader has escaped using his magical tricks!"
        [/message]

        [message]
            speaker=Brim
            message= _ "We must get out of here before he returns."
        [/message]
    [/event]
    {HERODEATHS}
[/scenario]
